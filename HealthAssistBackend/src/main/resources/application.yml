server:
  port: 8080

spring:
  application:
    name: HealthAssistBackend

  datasource:
    url: jdbc:mariadb://localhost:3306/healthassist
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  sql:
    init:
      mode: always
      continue-on-error: true

  ai:
    azure:
      openai:
        api-key: ${AZURE_OPENAI_KEY}
        endpoint: ${AZURE_OPENAI_ENDPOINT}
        chat:
          options:
            deployment-name: ${DEPLOYMENT_NAME:gpt-5-mini}
            temperature: 0.3
            max-completion-tokens: 500
        embedding:
          options:
            deployment-name: ${EMBEDDING_DEPLOYMENT:text-embedding-ada-002}

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

healthassist:
  vector-store:
    path: ./data/vector-store.json
  rag:
    similarity-threshold: 0.7
    top-k: 5
    allow-empty-context: false
  rate-limit:
    max-requests-per-minute: 30
  kb:
    documents-path: "classpath:kb/"
    sop-path: "classpath:*.md"

logging:
  level:
    com.example.HealthAssistBackend: DEBUG
    org.springframework.ai: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
